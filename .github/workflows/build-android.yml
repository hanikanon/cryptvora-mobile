name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Add Android platform (first run only)
        run: test -d android || npx cap add android

      - name: Grant microphone permission (needed for real voice calls)
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          grep -q 'android.permission.RECORD_AUDIO' "$MANIFEST" || \
            sed -i 's#<manifest #<manifest #; s#</manifest>#    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />\n</manifest>#' "$MANIFEST"
          cat "$MANIFEST"

      - name: Generate app icon from resources/icon.png
        run: npx capacitor-assets generate --android

      - name: Use fixed debug keystore (so updates install without uninstalling)
        run: |
          mkdir -p ~/.android
          base64 -d android-keystore/debug.keystore.b64 > ~/.android/debug.keystore

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Grant execute permission to gradlew
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cryptvora-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
